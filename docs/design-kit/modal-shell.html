<!-- @dsCard group="Shell" name="Modal shell" subtitle="Cabeçalho, corpo e rodapé — base dos dynamic_form" -->
<style>
:root{
  --surface-2:#fff;--surface-1:#f7f6f3;--surface-0:#f0eee9;
  --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#8a8980;
  --text-accent:#185fa5;--bg-accent:#e6f1fb;--border-accent:#85b7eb;
  --border:#e3e1da;--border-strong:#cfccc4;--radius:8px;
  --font-sans:'Anthropic Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;--font-mono:ui-monospace,Menlo,monospace;
}
@media (prefers-color-scheme:dark){:root{
  --surface-2:#26252a;--surface-1:#1f1e22;--surface-0:#191a1d;
  --text-primary:#f3f1ec;--text-secondary:#b4b2a9;--text-muted:#8a8980;
  --text-accent:#85b7eb;--bg-accent:#0c2740;--border-accent:#185fa5;
  --border:#3a3940;--border-strong:#4a4951;
}}
body{font-family:var(--font-sans);color:var(--text-primary);background:var(--surface-0);margin:0;padding:20px;}
.m{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;max-width:560px;margin:0 auto;}
.m-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:0.5px solid var(--border);}
.m-head .ic{width:18px;height:18px;border-radius:5px;background:var(--bg-accent);display:inline-block;}
.m-title{font-size:15px;font-weight:500;}
.m-hint{margin-left:auto;font-size:11px;font-family:var(--font-mono);color:var(--text-secondary);}
.m-x{width:18px;height:18px;border-radius:4px;border:0.5px solid var(--border);}
.m-body{padding:16px;color:var(--text-secondary);font-size:13px;min-height:80px;}
.slot{border:1px dashed var(--border-strong);border-radius:var(--radius);padding:18px;text-align:center;color:var(--text-muted);font-size:12px;}
.m-foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:0.5px solid var(--border);}
.btn{font-size:12px;padding:6px 12px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-primary);}
.btn-primary{background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent);}
</style>
<div class="m">
  <div class="m-head">
    <span class="ic"></span>
    <span class="m-title">Título do modal</span>
    <span class="m-hint">dynamic_form · sem recarregar</span>
    <span class="m-x"></span>
  </div>
  <div class="m-body"><div class="slot">slot de conteúdo — form, picker, lista…</div></div>
  <div class="m-foot"><span class="btn">Cancelar</span><span class="btn btn-primary">Salvar</span></div>
</div>
