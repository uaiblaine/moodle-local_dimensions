<!-- @dsCard group="Dados" name="Mestre-detalhe" subtitle="Árvore de competências + painel de detalhe + chips de framework · Moodle DS" -->
<style>
:root{
  --mds-blue-50:#e7f0f9;--mds-blue-200:#9fc4e5;--mds-blue-500:#0f6cbf;
  --mds-yellow-100:#fcefdc;--mds-yellow-800:#60451f;
  --mds-green-100:#d7e4d6;--mds-green-800:#153114;
  --mds-gray-100:#f8f9fa;--mds-gray-200:#e9ecef;--mds-gray-300:#dee2e6;--mds-gray-400:#ced4da;--mds-gray-600:#6a737b;--mds-gray-900:#1d2125;--mds-white:#fff;
  --mds-surface:var(--mds-white);--mds-surface-subtle:var(--mds-gray-100);--mds-text:var(--mds-gray-900);--mds-text-muted:var(--mds-gray-600);
  --mds-border:var(--mds-gray-300);--mds-primary:var(--mds-blue-500);--mds-primary-tint:var(--mds-blue-50);--mds-primary-border:var(--mds-blue-200);
  --mds-radius:0.5rem;--font-sans:'Noto Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;--font-mono:Menlo,ui-monospace,monospace;
  --surface-2:var(--mds-surface);--surface-1:var(--mds-surface-subtle);--surface-0:var(--mds-gray-200);
  --text-primary:var(--mds-text);--text-secondary:var(--mds-text-muted);--text-muted:var(--mds-text-muted);
  --text-accent:var(--mds-primary);--bg-accent:var(--mds-primary-tint);--border-accent:var(--mds-primary-border);
  --text-warning:var(--mds-yellow-800);--bg-warning:var(--mds-yellow-100);--border-warning:var(--mds-yellow-800);
  --text-success:var(--mds-green-800);--bg-success:var(--mds-green-100);--border-success:var(--mds-green-800);
  --border:var(--mds-border);--border-strong:var(--mds-gray-400);--radius:var(--mds-radius);
}
@media (prefers-color-scheme:dark){:root{
  --mds-surface:#1d2125;--mds-surface-subtle:#16191c;--mds-text:#f8f9fa;--mds-text-muted:#ced4da;
  --mds-border:#495057;--mds-primary:#3f89cc;--mds-primary-tint:#062b4c;--mds-primary-border:#0f6cbf;
  --surface-2:var(--mds-surface);--surface-1:var(--mds-surface-subtle);--surface-0:#0e1012;
  --text-primary:var(--mds-text);--text-secondary:var(--mds-text-muted);--text-muted:var(--mds-text-muted);
  --text-accent:var(--mds-primary);--bg-accent:var(--mds-primary-tint);--border-accent:var(--mds-primary-border);
  --text-warning:#f3bd71;--bg-warning:#60451f;--border-warning:#f3bd71;
  --text-success:#86af84;--bg-success:#153114;--border-success:#86af84;
  --border:var(--mds-border);--border-strong:#6a737b;
}}
body{font-family:var(--font-sans);color:var(--text-primary);background:var(--surface-0);margin:0;padding:20px;}
.md{display:flex;gap:12px;flex-wrap:wrap;max-width:580px;margin:0 auto;}
.pane{border:1px solid var(--border);border-radius:var(--radius);padding:10px;background:var(--surface-2);}
.tree{flex:1 1 280px;min-width:250px;}
.detail{flex:1 1 220px;min-width:210px;}
.row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:13px;}
.row.sel{background:var(--bg-accent);} .row.sel .nm{color:var(--text-accent);}
.ind{padding-left:26px;}
.tag{font-size:10px;padding:1px 6px;border-radius:10px;border:1px solid;}
.chip{font-size:11px;padding:1px 7px;border-radius:var(--radius);background:var(--bg-accent);color:var(--text-accent);display:inline-block;}
.act{display:flex;align-items:center;gap:7px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;}
</style>
<div class="md">
  <div class="pane tree">
    <div style="font-size:13px;font-weight:500;margin-bottom:6px;">Estrutura do framework</div>
    <div class="row"><span style="color:var(--text-muted)">⌄</span><span class="nm">Comunicação</span></div>
    <div class="row ind"><span style="color:var(--text-muted)">•</span><span class="nm">Comunicação escrita</span></div>
    <div class="row sel"><span style="color:var(--text-accent)">⌄</span><span class="nm">Resolução de problemas</span></div>
    <div class="row ind"><span style="color:var(--text-muted)">•</span><span class="nm">Pensamento analítico</span></div>
    <div class="row"><span style="color:var(--text-muted)">⌄</span><span class="nm">Trabalho em equipe</span></div>
  </div>
  <div class="pane detail">
    <div style="font-size:11px;color:var(--text-accent);">Competência</div>
    <div style="font-size:15px;font-weight:500;">Resolução de problemas</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;">
      <span class="chip">8 cursos · 21 atividades</span>
      <span class="chip" style="background:var(--surface-1);color:var(--text-secondary);">em 2 planos</span>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <span class="tag" style="background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent)">CG-EP</span>
      <span class="tag" style="background:var(--bg-warning);color:var(--text-warning);border-color:var(--border-warning)">MAT</span>
      <span class="tag" style="background:var(--bg-success);color:var(--text-success);border-color:var(--border-success)">TI-SEC</span>
    </div>
    <div style="margin-top:10px;display:grid;gap:6px;">
      <div class="act" style="border-color:var(--mds-primary);background:var(--mds-primary);color:#fff">Vincular a cursos e atividades</div>
      <div class="act">Editar competência</div>
    </div>
  </div>
</div>
