<!-- @dsCard group="Navegação" name="Navegação hierárquica" subtitle="Contexto + contador, trilha adaptativa, abas Estrutura/Planos" -->
<style>
:root{
  --surface-2:#fff;--surface-1:#f7f6f3;--surface-0:#f0eee9;
  --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#8a8980;
  --text-accent:#185fa5;--bg-accent:#e6f1fb;--border-accent:#85b7eb;
  --border:#e3e1da;--border-strong:#cfccc4;--radius:8px;
  --font-sans:'Anthropic Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
@media (prefers-color-scheme:dark){:root{
  --surface-2:#26252a;--surface-1:#1f1e22;--surface-0:#191a1d;
  --text-primary:#f3f1ec;--text-secondary:#b4b2a9;--text-muted:#8a8980;
  --text-accent:#85b7eb;--bg-accent:#0c2740;--border-accent:#185fa5;
  --border:#3a3940;--border-strong:#4a4951;
}}
body{font-family:var(--font-sans);color:var(--text-primary);background:var(--surface-0);margin:0;padding:20px;}
.wrap{max-width:560px;margin:0 auto;display:grid;gap:12px;}
.seg{display:inline-flex;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.seg span{padding:6px 10px;font-size:12px;color:var(--text-secondary);}
.seg span.on{background:var(--bg-accent);color:var(--text-accent);}
.cat{border:0.5px solid var(--border-accent);border-radius:var(--radius);background:var(--bg-accent);padding:8px;}
.opt{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:12px;background:var(--surface-2);}
.count{margin-left:auto;font-size:11px;padding:1px 7px;border-radius:10px;background:var(--surface-1);color:var(--text-secondary);border:0.5px solid var(--border);}
.rail{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface-2);}
.rseg{border:0.5px solid var(--border);border-radius:var(--radius);padding:5px 10px;}
.rseg.on{background:var(--bg-accent);border-color:var(--border-accent);}
.rl{font-size:10px;color:var(--text-secondary);} .rseg.on .rl{color:var(--text-accent);}
.rv{font-size:12px;font-weight:500;} .rseg.on .rv{color:var(--text-accent);}
.sep{color:var(--text-muted);}
</style>
<div class="wrap">
  <div class="seg" aria-label="Contexto"><span>Sistema</span><span class="on">Categoria de curso</span></div>
  <div class="cat">
    <div class="opt" style="background:var(--surface-1);"><span style="font-weight:500;">Educação Profissional</span><span class="count">3 frameworks</span></div>
    <div class="opt" style="margin-top:6px;"><span>Ensino Médio Técnico</span><span class="count">1 framework</span></div>
    <div class="opt" style="margin-top:6px;"><span style="color:var(--text-secondary)">Formação Continuada</span><span class="count" style="color:var(--text-muted)">sem frameworks</span></div>
  </div>
  <div class="rail">
    <div class="rseg"><div class="rl">Contexto</div><div class="rv">Ed. Profissional</div></div>
    <span class="sep">▸</span>
    <div class="rseg on"><div class="rl">Framework</div><div class="rv">Competências Gerais ⌄</div></div>
    <span class="sep">▸</span>
    <div class="rseg"><div class="rl">Competência</div><div class="rv">Resolução de problemas</div></div>
  </div>
  <div class="seg" aria-label="Seção"><span class="on">Estrutura</span><span>Planos de Aprendizagem</span></div>
</div>
