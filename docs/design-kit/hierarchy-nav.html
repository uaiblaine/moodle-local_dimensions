<!-- @dsCard group="Navegação" name="Navegação hierárquica" subtitle="Contexto (nav-pill cinza) + contador, trilha adaptativa, abas · Moodle DS" -->
<style>
:root{
  --mds-blue-50:#e7f0f9;--mds-blue-200:#9fc4e5;--mds-blue-500:#0f6cbf;
  --mds-gray-100:#f8f9fa;--mds-gray-200:#e9ecef;--mds-gray-300:#dee2e6;--mds-gray-400:#ced4da;--mds-gray-600:#6a737b;--mds-gray-900:#1d2125;--mds-white:#fff;
  --mds-surface:var(--mds-white);--mds-surface-subtle:var(--mds-gray-100);--mds-text:var(--mds-gray-900);--mds-text-muted:var(--mds-gray-600);
  --mds-border:var(--mds-gray-300);--mds-primary:var(--mds-blue-500);--mds-primary-tint:var(--mds-blue-50);--mds-primary-border:var(--mds-blue-200);
  --mds-navpill-selected:var(--mds-gray-200);
  --mds-radius:0.5rem;--font-sans:'Noto Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --surface-2:var(--mds-surface);--surface-1:var(--mds-surface-subtle);--surface-0:var(--mds-gray-200);
  --text-primary:var(--mds-text);--text-secondary:var(--mds-text-muted);--text-muted:var(--mds-text-muted);
  --text-accent:var(--mds-primary);--bg-accent:var(--mds-primary-tint);--border-accent:var(--mds-primary-border);
  --border:var(--mds-border);--border-strong:var(--mds-gray-400);--radius:var(--mds-radius);
}
@media (prefers-color-scheme:dark){:root{
  --mds-surface:#1d2125;--mds-surface-subtle:#16191c;--mds-text:#f8f9fa;--mds-text-muted:#ced4da;
  --mds-border:#495057;--mds-primary:#3f89cc;--mds-primary-tint:#062b4c;--mds-primary-border:#0f6cbf;--mds-navpill-selected:#343a40;
  --surface-2:var(--mds-surface);--surface-1:var(--mds-surface-subtle);--surface-0:#0e1012;
  --text-primary:var(--mds-text);--text-secondary:var(--mds-text-muted);--text-muted:var(--mds-text-muted);
  --text-accent:var(--mds-primary);--bg-accent:var(--mds-primary-tint);--border-accent:var(--mds-primary-border);
  --border:var(--mds-border);--border-strong:#6a737b;
}}
body{font-family:var(--font-sans);color:var(--text-primary);background:var(--surface-0);margin:0;padding:20px;}
.wrap{max-width:560px;margin:0 auto;display:grid;gap:12px;}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.seg span{padding:6px 10px;font-size:12px;color:var(--text-secondary);}
.seg span.on{background:var(--mds-navpill-selected);color:var(--text-primary);font-weight:500;}
.cat{border:1px solid var(--border-accent);border-radius:var(--radius);background:var(--bg-accent);padding:8px;}
.opt{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:12px;background:var(--surface-2);}
.count{margin-left:auto;font-size:11px;padding:1px 7px;border-radius:10px;background:var(--surface-1);color:var(--text-secondary);border:1px solid var(--border);}
.rail{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-2);}
.rseg{border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;}
.rseg.on{background:var(--bg-accent);border-color:var(--border-accent);}
.rl{font-size:10px;color:var(--text-secondary);} .rseg.on .rl{color:var(--text-accent);}
.rv{font-size:12px;font-weight:500;} .rseg.on .rv{color:var(--text-accent);}
.sep{color:var(--text-muted);}
</style>
<div class="wrap">
  <div class="seg" aria-label="Contexto"><span>Sistema</span><span class="on">Categoria de curso</span></div>
  <div class="cat">
    <div class="opt" style="background:var(--surface-1);"><span style="font-weight:500;">Educação Profissional</span><span class="count">3 frameworks</span></div>
    <div class="opt" style="margin-top:6px;"><span>Ensino Médio Técnico</span><span class="count">1 framework</span></div>
    <div class="opt" style="margin-top:6px;"><span style="color:var(--text-secondary)">Formação Continuada</span><span class="count" style="color:var(--text-muted)">sem frameworks</span></div>
  </div>
  <div class="rail">
    <div class="rseg"><div class="rl">Contexto</div><div class="rv">Ed. Profissional</div></div>
    <span class="sep">▸</span>
    <div class="rseg on"><div class="rl">Framework</div><div class="rv">Competências Gerais ⌄</div></div>
    <span class="sep">▸</span>
    <div class="rseg"><div class="rl">Competência</div><div class="rv">Resolução de problemas</div></div>
  </div>
  <div class="seg" aria-label="Seção"><span class="on">Estrutura</span><span>Planos de Aprendizagem</span></div>
</div>
