<!-- @dsCard group="Fundações" name="Tokens" subtitle="Paleta, papéis, tipografia, espaçamento" -->
<style>
:root{
  --surface-2:#fff;--surface-1:#f7f6f3;--surface-0:#f0eee9;
  --text-primary:#1a1a18;--text-secondary:#5f5e5a;--text-muted:#8a8980;
  --text-accent:#185fa5;--bg-accent:#e6f1fb;--border-accent:#85b7eb;
  --text-danger:#a32d2d;--border-danger:#f09595;--bg-danger:#fcebeb;
  --text-success:#0f6e56;--border-success:#5dcaa5;--bg-success:#e1f5ee;
  --text-warning:#854f0b;--border-warning:#ef9f27;--bg-warning:#faeeda;
  --border:#e3e1da;--border-strong:#cfccc4;--border-stronger:#b4b2a9;
  --radius:8px;--font-sans:'Anthropic Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --font-mono:ui-monospace,SFMono-Regular,Menlo,monospace;
}
@media (prefers-color-scheme:dark){:root{
  --surface-2:#26252a;--surface-1:#1f1e22;--surface-0:#191a1d;
  --text-primary:#f3f1ec;--text-secondary:#b4b2a9;--text-muted:#8a8980;
  --text-accent:#85b7eb;--bg-accent:#0c2740;--border-accent:#185fa5;
  --text-danger:#f09595;--border-danger:#791f1f;--bg-danger:#2a1313;
  --text-success:#5dcaa5;--border-success:#085041;--bg-success:#0a2a24;
  --text-warning:#ef9f27;--border-warning:#633806;--bg-warning:#2a1f0a;
  --border:#3a3940;--border-strong:#4a4951;--border-stronger:#5f5e5a;
}}
body{font-family:var(--font-sans);color:var(--text-primary);background:var(--surface-0);margin:0;padding:20px;line-height:1.6;}
.k-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:10px 0 20px;}
.k-sw{border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface-2);}
.k-sw .bar{height:42px;}
.k-sw .lab{padding:6px 8px;font-size:11px;color:var(--text-secondary);font-family:var(--font-mono);}
.k-h{font-size:13px;font-weight:500;color:var(--text-secondary);margin:6px 0;text-transform:none;}
.k-role{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--radius);font-size:12px;border:0.5px solid;}
</style>
<div class="k-h">Superfícies e bordas</div>
<div class="k-grid">
  <div class="k-sw"><div class="bar" style="background:var(--surface-0)"></div><div class="lab">--surface-0</div></div>
  <div class="k-sw"><div class="bar" style="background:var(--surface-1)"></div><div class="lab">--surface-1</div></div>
  <div class="k-sw"><div class="bar" style="background:var(--surface-2)"></div><div class="lab">--surface-2</div></div>
  <div class="k-sw"><div class="bar" style="background:var(--border)"></div><div class="lab">--border</div></div>
  <div class="k-sw"><div class="bar" style="background:var(--border-stronger)"></div><div class="lab">--border-stronger</div></div>
</div>
<div class="k-h">Papéis semânticos</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
  <span class="k-role" style="background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent)">accent</span>
  <span class="k-role" style="background:var(--bg-success);color:var(--text-success);border-color:var(--border-success)">success</span>
  <span class="k-role" style="background:var(--bg-warning);color:var(--text-warning);border-color:var(--border-warning)">warning</span>
  <span class="k-role" style="background:var(--bg-danger);color:var(--text-danger);border-color:var(--border-danger)">danger</span>
</div>
<div class="k-h">Tipografia</div>
<div style="margin-bottom:18px;">
  <div style="font-size:18px;font-weight:500;">Título de seção · 18/500</div>
  <div style="font-size:15px;font-weight:500;">Subtítulo · 15/500</div>
  <div style="font-size:13px;color:var(--text-secondary);">Corpo secundário · 13/400</div>
  <div style="font-size:12px;font-family:var(--font-mono);color:var(--text-secondary);">mono · RP-001 · idnumber</div>
</div>
<div class="k-h">Raio e espaçamento</div>
<div style="display:flex;gap:14px;align-items:flex-end;">
  <div style="width:72px;height:48px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--surface-2);"></div>
  <span style="font-size:12px;color:var(--text-secondary);">--radius 8px · cards 12px · gap 8/12/16</span>
</div>
