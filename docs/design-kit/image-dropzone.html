<!-- @dsCard group="Formulário" name="Dropzone de imagem" subtitle="Anexo padrão Moodle (arrasta e solta) — funciona em modal · Moodle DS" -->
<style>
:root{
  --mds-blue-200:#9fc4e5;--mds-blue-500:#0f6cbf;--mds-green-500:#357a32;
  --mds-gray-100:#f8f9fa;--mds-gray-200:#e9ecef;--mds-gray-300:#dee2e6;--mds-gray-400:#ced4da;--mds-gray-600:#6a737b;--mds-gray-900:#1d2125;--mds-white:#fff;
  --mds-surface:var(--mds-white);--mds-surface-subtle:var(--mds-gray-100);--mds-text:var(--mds-gray-900);--mds-text-muted:var(--mds-gray-600);
  --mds-border:var(--mds-gray-300);--mds-primary:var(--mds-blue-500);
  --mds-radius:0.5rem;--font-sans:'Noto Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --surface-2:var(--mds-surface);--surface-1:var(--mds-surface-subtle);--surface-0:var(--mds-gray-200);
  --text-primary:var(--mds-text);--text-secondary:var(--mds-text-muted);--text-muted:var(--mds-text-muted);
  --text-accent:var(--mds-primary);--border:var(--mds-border);--border-stronger:var(--mds-gray-400);--radius:var(--mds-radius);
}
@media (prefers-color-scheme:dark){:root{
  --mds-surface:#1d2125;--mds-surface-subtle:#16191c;--mds-text:#f8f9fa;--mds-text-muted:#ced4da;
  --mds-border:#495057;--mds-primary:#3f89cc;
  --surface-2:var(--mds-surface);--surface-1:var(--mds-surface-subtle);--surface-0:#0e1012;
  --text-primary:var(--mds-text);--text-secondary:var(--mds-text-muted);--text-muted:var(--mds-text-muted);
  --text-accent:var(--mds-primary);--border:var(--mds-border);--border-stronger:#6a737b;
}}
body{font-family:var(--font-sans);color:var(--text-primary);background:var(--surface-0);margin:0;padding:20px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:520px;margin:0 auto;}
.lbl{font-size:11px;color:var(--text-secondary);margin-bottom:4px;display:block;}
.drop{border:1px dashed var(--border-stronger);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:10px;background:var(--surface-1);}
.thumb{width:40px;height:40px;border-radius:6px;border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;}
.up{font-size:22px;color:var(--text-accent);}
.t1{font-size:11px;color:var(--text-primary);}
.t2{font-size:11px;color:var(--text-muted);}
.acc{color:var(--text-accent);}
</style>
<div class="row">
  <div>
    <span class="lbl">Imagem do card (com arquivo)</span>
    <div class="drop"><div class="thumb" style="background:var(--mds-green-500);">▣</div><div><div class="t1">card.jpg</div><div class="t2 acc">arraste para substituir</div></div></div>
  </div>
  <div>
    <span class="lbl">Imagem de fundo (vazio)</span>
    <div class="drop"><span class="up">⤒</span><div><div class="t1">Arraste e solte aqui</div><div class="t2">ou clique para enviar</div></div></div>
  </div>
</div>
